<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keto Origins - Intervención Metabólica Escolar 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: League Spartan -->
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'League Spartan', sans-serif; background-color: #1a0b2e; color: white; }
        .font-league { font-family: 'League Spartan', sans-serif; }
        @keyframes pulse-custom { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse-custom { animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS SVG ---
        const Users = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const ChevronRight = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const Activity = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const Brain = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.54Z"/></svg>;
        const Heart = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const AlertTriangle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>;
        const MessageCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
        const ArrowLeft = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const ShieldCheck = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
        const Zap = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
        const CheckCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const X = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Scale = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>;
        const Clock = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const Calendar = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const CreditCard = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>;

        const GOOGLE_SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwKsRHW9LxOcMUIaU9ze1XxAAV1iW8AhxKA0ZL87WqAiSjii3uTBebrqRwvPyNumfMoag/exec"; 
        const WHATSAPP_OFFICIAL_LINK = "https://wa.link/gsc01c";
        
        // --- URL DE PAGO FLOW ACTUALIZADA ---
        const PAYMENT_URL_FLOW = "https://www.flow.cl/btn.php?token=m8159ed27dfe3eb7cd9144d470fc4d6040c3e0dd";

        const MASTERCLASSES_BASE = [
            {
                id: 'diabetes',
                title: 'Resistencia a la insulina (Diabetes infantil)',
                shortDesc: 'Cómo el azúcar está agotando el páncreas y la energía de tu hijo.',
                definition: `La hiperinsulinemia compensatoria es el preludio del fallo multiorgánico. En el paciente pediátrico, la ingesta crónica de carbohidratos refinados induce un estado de inflamación de bajo grado que bloquea los receptores GLUT4. Esto obliga al páncreas a una sobreproducción exhaustiva de insulina, derivando en una disfunción de las células beta. No estamos ante un simple "azúcar alto", sino ante una glicación proteica que daña irreversiblemente el endotelio vascular y la filtración glomerular renal antes de los 15 años.`,
                prevalence: '61.9% de los escolares chilenos presentan niveles de insulina sérica en rangos de riesgo crítico (Junaeb).',
                color: 'from-pink-500 to-magenta-600',
                borderColor: 'from-pink-400 via-magenta-500 to-indigo-500',
                icon: <Activity className="w-6 h-6 text-white" />
            },
            {
                id: 'obesidad',
                title: 'Sobrepeso y Obesidad infantil',
                shortDesc: 'Por qué tu hijo tiene hambre constante y vive cansado.',
                definition: `La obesidad infantil no es un exceso de reservas; es una hambruna celular en un cuerpo saturado de energía. La inflamación del hipotálamo, inducida por aceites vegetales y fructosa, genera una resistencia severa a la leptina. El cerebro deja de recibir la señal de saciedad, manteniendo al niño en un estado de búsqueda constante de glucosa. Este cortocorticuito hormonal altera el eje tiroideo y gonadal, comprometiendo el desarrollo puberal y la capacidad lipolítica del tejido adiposo blanco.`,
                prevalence: '51.7% de malnutrición por exceso. Chile lidera la región en obesidad infantil severa.',
                color: 'from-cyan-500 to-blue-600',
                borderColor: 'from-cyan-400 via-blue-500 to-indigo-600',
                icon: <Users className="w-6 h-6 text-white" />
            },
            {
                id: 'neuroinflamacion',
                title: 'Déficit de atención y memoria',
                shortDesc: 'La conexión directa entre la comida y el rendimiento escolar.',
                definition: `El TDAH y los trastornos del espectro cognitivo actual son cuadros de encefalopatía metabólica de bajo grado. La permeabilidad intestinal (leaky gut) permite el paso de lipopolisacáridos al torrente sanguíneo, activando la microglía cerebral. Este estado neuroinflamatorio crónico altera la poda sináptica y la neurotransmisión dopaminérgica. Un cerebro inflamado por excitotoxinas alimentarias es biológicamente incapaz de sostener la atención, procesar memoria a largo plazo o regular impulsos conductuales.`,
                prevalence: '7 de cada 10 diagnósticos de TDAH remiten significativamente al restaurar la barrera intestinal.',
                color: 'from-violet-600 to-fuchsia-700',
                borderColor: 'from-violet-500 via-fuchsia-600 to-pink-500',
                icon: <Brain className="w-6 h-6 text-white" />
            },
            {
                id: 'higado_graso',
                title: 'Hígado graso infantil',
                shortDesc: 'Cómo saber si el abdomen de tu hijo oculta un daño hepático.',
                definition: `Estamos viendo hígados de adultos alcohólicos en niños de 8 años. La fructosa industrial no sigue la ruta glucolítica estándar; se metaboliza exclusivamente en el hígado, saturando las mitocondrias y activando la lipogénesis de novo. Esto genera una acumulación de triglicéridos ectópicos que induce estrés oxidativo y fibrosis temprana. El "hígado graso" es la señal de que el laboratorio central del niño está colapsado, incapaz de detoxificar el cuerpo y regular el metabolismo lipídico.`,
                prevalence: 'Presente en el 40% de niños con sobrepeso. Silencioso y potencialmente fibrótico.',
                color: 'from-purple-500 to-indigo-600',
                borderColor: 'from-purple-400 via-indigo-500 to-blue-500',
                icon: <AlertTriangle className="w-6 h-6 text-white" />
            },
            {
                id: 'hipertension',
                title: 'Hipertensión y riesgo vascular infantil',
                shortDesc: 'El aviso silencioso del daño en el corazón infantil.',
                definition: `La hipertensión pediátrica es la manifestación mecánica de un desastre químico. La insulina elevada hace que el cuerpo guarde sal y que el corazón tenga que bombear con una fuerza que no le corresponde a su edad. Un niño con presión alta es un niño que está envejeciendo por dentro. Esta sobrecarga hemodinámica genera una hipertrofia ventricular izquierda temprana, reduciendo drásticamente la esperanza de vida cardiovascular del menor.`,
                prevalence: 'Afecta al 15% de la población pediátrica con síndrome metabólico en Chile.',
                color: 'from-blue-600 to-indigo-800',
                borderColor: 'from-blue-500 via-indigo-600 to-purple-600',
                icon: <Heart className="w-6 h-6 text-white" />
            }
        ];

        const App = () => {
            const [view, setView] = useState('home'); 
            const [selectedClass, setSelectedClass] = useState(null);
            const [activeSession, setActiveSession] = useState(null);
            const [loading, setLoading] = useState(true);
            const [processing, setProcessing] = useState(false);
            const [notification, setNotification] = useState(null);
            const [showDisclaimer, setShowDisclaimer] = useState(false);
            const [dynamicData, setDynamicData] = useState({ sessions: [] });
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', school: '' });

            const fetchSessionData = async () => {
                try {
                    const response = await fetch(`${GOOGLE_SHEET_WEBAPP_URL}?t=${Date.now()}`); 
                    const data = await response.json();
                    if (data && data.sessions) setDynamicData(data);
                } catch (error) {
                    console.error("Error sincronizando:", error);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchSessionData();
            }, []);

            const getNextAvailableSession = (pathologyId) => {
                if (!dynamicData.sessions || dynamicData.sessions.length === 0) return null;
                const target = pathologyId.toString().trim().toLowerCase();
                const sessions = dynamicData.sessions.filter(s => s.pathologyId === target);
                if (sessions.length === 0) return null;
                const available = sessions.find(s => s.taken < 30);
                return available || sessions[sessions.length - 1];
            };

            const handleSelectClass = (mc) => {
                const session = getNextAvailableSession(mc.id);
                setSelectedClass(mc);
                setActiveSession(session);
                setView('detail');
                window.scrollTo(0, 0);
            };

            const handleSubmit = async () => {
                if (!formData.name || !formData.email || !formData.phone || !formData.school) {
                    setNotification("Por favor, completa todos los campos.");
                    setTimeout(() => setNotification(null), 3000);
                    return;
                }
                setProcessing(true);
                const params = new URLSearchParams();
                params.append('name', formData.name);
                params.append('email', formData.email);
                params.append('phone', formData.phone);
                params.append('school', formData.school);
                params.append('sessionId', activeSession?.sessionId || selectedClass.id);
                params.append('type', (activeSession && activeSession.taken >= 30) ? 'LISTA_ESPERA' : 'PENDIENTE');
                
                try {
                    await fetch(GOOGLE_SHEET_WEBAPP_URL, {
                        method: 'POST', mode: 'no-cors', body: params.toString(),
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    setProcessing(false);
                    setView('success');
                    window.scrollTo(0, 0);
                } catch (e) {
                    setProcessing(false);
                    setView('success');
                }
            };

            if (loading) return (
                <div className="min-h-screen bg-[#1a0b2e] flex flex-col items-center justify-center text-center px-6">
                    <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-magenta-500 mb-4 font-league"></div>
                    <span className="text-white/40 text-[10px] uppercase font-black tracking-widest animate-pulse-custom">Sincronizando Aula Digital...</span>
                </div>
            );

            return (
                <div className="min-h-screen text-white font-league selection:bg-magenta-500/30 overflow-x-hidden">
                    
                    {/* MODAL DESCARGO DE RESPONSABILIDAD */}
                    {showDisclaimer && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 backdrop-blur-2xl bg-black/80 animate-in fade-in duration-300">
                            <div className="bg-[#25163d] border border-white/10 p-10 rounded-[3rem] max-w-2xl w-full shadow-4xl relative text-center">
                                <button onClick={() => setShowDisclaimer(false)} className="absolute top-8 right-8 text-white/40 hover:text-white transition-colors"><X className="w-6 h-6" /></button>
                                <div className="flex items-center justify-center space-x-4 mb-8 text-cyan-400">
                                    <Scale className="w-8 h-8" />
                                    <h3 className="text-2xl font-black uppercase tracking-tighter">Descargo de Responsabilidad</h3>
                                </div>
                                <div className="space-y-6 text-white/70 leading-relaxed font-light italic text-sm text-left">
                                    <p><strong>Keto Origins</strong> es una plataforma pedagógica enfocada en soberanía biológica.</p>
                                    <p>Este programa no sustituye tratamientos farmacológicos médicos. La gestión de fármacos es competencia <strong>exclusiva de su médico de cabecera</strong>.</p>
                                </div>
                                <button onClick={() => setShowDisclaimer(false)} className="mt-10 w-full bg-cyan-500/10 border border-cyan-500/30 py-5 rounded-2xl font-black uppercase tracking-widest text-cyan-400">ENTENDIDO</button>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[100] bg-[#2d1b4a] border-l-4 border-l-magenta-500 px-8 py-4 rounded-xl shadow-2xl font-black uppercase text-xs tracking-widest">
                            {notification}
                        </div>
                    )}

                    <header className="pt-16 pb-12 flex flex-col items-center">
                        <img src="https://i.ibb.co/7tjkYW1m/Dise-o-sin-t-tulo.png" className="h-40 sm:h-56 md:h-64 mb-8 drop-shadow-[0_0_25px_rgba(255,0,127,0.5)] transition-all duration-700 hover:scale-105" alt="Logo Keto Origins" />
                        {view === 'home' ? (
                            <div className="text-center px-4 max-w-2xl">
                                <h1 className="text-4xl font-black leading-tight uppercase tracking-tighter">Intervención de Salud Metabólica Escolar</h1>
                                <div className="h-[2px] w-16 bg-gradient-to-r from-cyan-400 to-magenta-500 mx-auto my-6"></div>
                                <p className="text-lg text-cyan-400 font-black opacity-90 tracking-widest uppercase">Recuperando la Soberanía de tus hijos</p>
                            </div>
                        ) : (
                            <button onClick={() => setView('home')} className="flex items-center bg-white/5 px-8 py-3 rounded-full text-cyan-400 text-[10px] font-black uppercase border border-white/10 transition-all active:scale-95">
                                <ArrowLeft className="w-4 h-4 mr-3" /> VOLVER AL LISTADO
                            </button>
                        )}
                    </header>

                    {view === 'home' && (
                        <main className="px-6 pb-32 max-w-4xl mx-auto animate-in fade-in duration-1000">
                            {/* BLOQUE 1: EMERGENCIA BIOLÓGICA (JUNAEB) */}
                            <div className="bg-gradient-to-br from-purple-900/60 via-[#25163d] to-transparent p-10 sm:p-14 rounded-[3.5rem] border border-white/10 mb-16 relative overflow-hidden shadow-2xl text-center">
                                <div className="absolute top-0 right-0 p-8 opacity-5"><ShieldCheck className="w-40 h-40 text-white" /></div>
                                <h2 className="text-3xl font-black mb-8 inline-flex items-center text-magenta-400 tracking-tight leading-tight text-center justify-center uppercase">
                                    <Zap className="w-8 h-8 mr-4 fill-magenta-400" />
                                    Estado de Emergencia Biológica
                                </h2>
                                <div className="space-y-6 text-white/90 leading-relaxed text-lg font-light italic">
                                    <p> Chile enfrenta una crisis de salud pública sin precedentes. Según el <strong>Mapa Nutricional de la Junaeb 2025</strong>, el <strong>51,7%</strong> de los escolares sufren malnutrición por exceso, llegando a un crítico <strong>61,9%</strong> en niveles como 5° básico.</p>
                                    <p>Este programa es una intervención técnica diseñada para que los padres recuperen su autoridad como gestores de la salud familiar frente al colapso metabólico escolar.</p>
                                </div>
                            </div>

                            {/* BLOQUE 2: MASTERCLASSES */}
                            <h3 className="text-[20px] uppercase tracking-tight font-light italic text-magenta-500 mb-10 ml-4 flex items-center">
                                <div className="w-16 h-[2px] bg-magenta-500 mr-6"></div>Elige tu Masterclass Técnica
                            </h3>

                            <div className="grid gap-8 mb-24">
                                {MASTERCLASSES_BASE.map((mc) => {
                                    const session = getNextAvailableSession(mc.id);
                                    const isFull = !session || session.taken >= 30;
                                    return (
                                        <div key={mc.id} className={`p-[1px] rounded-[2.5rem] bg-gradient-to-r ${mc.borderColor} shadow-xl`}>
                                            <button onClick={() => handleSelectClass(mc)} className="w-full text-left bg-[#1a0b2e] rounded-[calc(2.5rem-1px)] p-8 flex items-center justify-between group transition-all">
                                                <div className="flex items-center space-x-8">
                                                    <div className={`p-6 rounded-[1.5rem] bg-gradient-to-br ${mc.color} shadow-xl group-hover:scale-110 transition-transform drop-shadow-[0_0_15px_rgba(255,0,127,0.4)]`}>{mc.icon}</div>
                                                    <div>
                                                        <h4 className="font-black text-2xl group-hover:text-cyan-300 transition-colors tracking-tighter uppercase">{mc.title}</h4>
                                                        <div className="inline-flex items-center bg-white/5 border border-white/10 px-6 py-2 rounded-full mt-4">
                                                            <Users className="w-4 h-4 mr-3 text-cyan-400" /> 
                                                            <span className="text-[10px] font-black text-white/80 uppercase tracking-widest">{isFull ? 'AULA EN FORMACIÓN' : `${30 - (session?.taken || 0)} Cupos Libres`}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <ChevronRight className="w-8 h-8 text-white/20 group-hover:text-magenta-500 group-hover:translate-x-2 transition-all" />
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* BLOQUE 3: EQUIPO - PARIDAD ESTÉTICA TOTAL (CORREGIDO) */}
                            <section className="mb-20">
                                <h3 className="text-[20px] uppercase tracking-tight font-light italic text-cyan-400 mb-6 ml-4 flex items-center">
                                    <div className="w-16 h-[2px] bg-cyan-400 mr-6"></div>Liderazgo Técnico y Pedagógico
                                </h3>
                                <p className="text-white/70 text-sm mb-10 ml-4 max-w-2xl font-light italic leading-relaxed">
                                    Este programa es liderado por especialistas que forman parte integral de Keto Origins, garantizando un abordaje serio y educativo:
                                </p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    
                                    {/* Perfil Maryorie Denisse Fernández Quezada (TOTALMENTE IGUALADO) */}
                                    <div className="p-[1px] rounded-[2.5rem] bg-gradient-to-br from-pink-500 via-magenta-500 to-indigo-500 group hover:from-pink-400 hover:to-indigo-400 transition-all duration-500 shadow-2xl">
                                        <div className="bg-[#1a0b2e] p-8 rounded-[calc(2.5rem-1px)] flex flex-col items-center text-center h-full backdrop-blur-md relative overflow-hidden border border-white/5">
                                            <div className="w-32 h-32 rounded-full bg-gradient-to-br from-pink-500 to-magenta-600 mb-6 flex items-center justify-center p-1 shadow-2xl drop-shadow-[0_0_20px_rgba(255,0,127,0.6)] transition-transform group-hover:scale-105">
                                                <div className="w-full h-full rounded-full bg-[#1a0b2e] flex items-center justify-center overflow-hidden">
                                                    <img src="https://i.ibb.co/m5XcSzW2/Copia-de-Dise-o-sin-t-tulo-2.png" className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="Maryorie Fernández" />
                                                </div>
                                            </div>
                                            <h4 className="text-xl font-black uppercase tracking-tighter mb-1">Maryorie Denisse Fernández Quezada</h4>
                                            <p className="text-magenta-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Docente • Liderazgo y Gestión Educacional</p>
                                            <div className="space-y-2 text-white/60 text-[13px] font-light italic leading-relaxed text-left border-t border-white/5 pt-4 w-full">
                                                <p>• Magíster en Liderazgo de Gestión y Administración Educacional.</p>
                                                <p>• Educadora de Párvulos Licenciada en Educación.</p>
                                                <p>• Facilitadora grupal "Nadie es Perfecto" (SSVQ).</p>
                                                <p>• 16 años de trayectoria en el Servicio de Salud Viña del Mar Quillota.</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Perfil Franco Paolo Vásquez Baeza (MANTIENE SU ESTILO) */}
                                    <div className="p-[1px] rounded-[2.5rem] bg-gradient-to-br from-cyan-400 via-blue-500 to-indigo-600 group hover:from-cyan-300 hover:to-blue-400 transition-all duration-500 shadow-2xl">
                                        <div className="bg-[#1a0b2e] p-8 rounded-[calc(2.5rem-1px)] flex flex-col items-center text-center h-full backdrop-blur-md relative overflow-hidden border border-white/5">
                                            <div className="w-32 h-32 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 mb-6 flex items-center justify-center p-1 shadow-2xl drop-shadow-[0_0_20px_rgba(0,255,255,0.6)] transition-transform group-hover:scale-105">
                                                <div className="w-full h-full rounded-full bg-[#1a0b2e] flex items-center justify-center overflow-hidden">
                                                    <img src="https://i.ibb.co/rGB1N0jJ/Copia-de-Dise-o-sin-t-tulo-1.png" className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" alt="Franco Paolo Vásquez Baeza" />
                                                </div>
                                            </div>
                                            <h4 className="text-xl font-black uppercase tracking-tighter mb-1">Franco Paolo Vásquez Baeza</h4>
                                            <p className="text-cyan-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Fundador • Fisioterapeuta Deportivo</p>
                                            <div className="space-y-2 text-white/60 text-[13px] font-light italic leading-relaxed text-left border-t border-white/5 pt-4 w-full">
                                                <p>• Fisioterapeuta Deportivo con 14 años de experiencia clínica.</p>
                                                <p>• Fundador de Keto Origins.</p>
                                                <p>• Responsable de la visión estratégica de Soberanía Biológica.</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                </div>
                            </section>
                        </main>
                    )}

                    {view === 'detail' && selectedClass && (
                        <main className="px-6 pb-32 max-w-4xl mx-auto animate-in slide-in-from-right-10 duration-700">
                            <div className={`inline-flex p-6 rounded-[2rem] bg-gradient-to-br ${selectedClass.color} mb-10 shadow-3xl drop-shadow-[0_0_15px_rgba(255,0,127,0.4)]`}>{selectedClass.icon}</div>
                            <h2 className="text-3xl sm:text-4xl font-black mb-10 text-white leading-tight tracking-tighter uppercase">{selectedClass.title}</h2>
                            <div className="space-y-12">
                                <section className="bg-white/5 p-10 sm:p-14 rounded-[3.5rem] border border-white/10 shadow-3xl backdrop-blur-xl text-center">
                                    <h3 className="text-[10px] uppercase font-black text-magenta-400 mb-8 tracking-[0.4em]">ANÁLISIS BIOLÓGICO PROFUNDO</h3>
                                    <p className="text-xl text-white/80 leading-[2] font-light italic mb-10 text-center">"{selectedClass.definition}"</p>
                                </section>
                                <section className="px-4">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
                                        <div className="flex items-center space-x-4 bg-white/5 border border-white/10 p-6 rounded-3xl shadow-inner">
                                            <Calendar className="w-8 h-8 text-magenta-500 shrink-0" />
                                            <div>
                                                <p className="text-[10px] font-black uppercase text-white/40 tracking-widest">FECHA PROGRAMADA</p>
                                                <p className="text-xl font-bold text-white uppercase">{activeSession?.date || 'FECHA POR CONFIRMAR'}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center space-x-4 bg-white/5 border border-white/10 p-6 rounded-3xl shadow-inner">
                                            <Clock className="w-8 h-8 text-cyan-400 shrink-0" />
                                            <div>
                                                <p className="text-[10px] font-black uppercase text-white/40 tracking-widest">HORA DE INICIO</p>
                                                <p className="text-xl font-bold text-white uppercase">{activeSession?.time || 'HORA POR CONFIRMAR'}</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex justify-center mb-10">
                                        <div className="bg-cyan-500/10 border border-cyan-500/50 px-12 py-6 rounded-[2.5rem] text-center shadow-xl w-full max-w-sm">
                                            <span className="text-5xl font-black text-cyan-400 block">{activeSession ? Math.max(0, 30 - activeSession.taken) : 30}</span>
                                            <span className="text-[10px] font-black block text-cyan-300 tracking-[0.3em] mt-2 uppercase">Cupos Libres Reales</span>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-6 sm:grid-cols-10 gap-2 mb-16 max-w-2xl mx-auto">
                                        {Array(30).fill(null).map((_, i) => (
                                            <div key={i} className={`aspect-square w-8 sm:w-10 rounded-full flex items-center justify-center text-[8px] font-black transition-all duration-1000 mx-auto ${i < (activeSession?.taken || 0) ? 'bg-gradient-to-br from-magenta-500 to-fuchsia-600 text-white shadow-[0_0_8px_rgba(255,0,127,0.4)] scale-105' : 'bg-white/5 border border-white/10 text-white/10 scale-90'}`}>{i + 1}</div>
                                        ))}
                                    </div>
                                    <div className="p-[1px] rounded-[3.5rem] bg-gradient-to-br from-magenta-500 via-indigo-500 to-cyan-500 shadow-3xl overflow-hidden">
                                        <div className="bg-[#1a0b2e] p-10 rounded-[calc(3.5rem-1px)] relative overflow-hidden text-center">
                                            <h3 className="text-2xl font-black text-white mb-10 uppercase tracking-widest">Inscripción al Aula Digital</h3>
                                            <div className="space-y-6 mb-12">
                                                <input type="text" placeholder="Nombre Apoderado" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 focus:outline-none focus:border-magenta-500/50 transition-all font-light" />
                                                <input type="email" placeholder="Email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 focus:outline-none focus:border-magenta-500/50 transition-all font-light" />
                                                <input type="tel" placeholder="WhatsApp" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 focus:outline-none focus:border-magenta-500/50 transition-all font-light" />
                                                <input type="text" placeholder="Colegio / Establecimiento" value={formData.school} onChange={e => setFormData({...formData, school: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 focus:outline-none focus:border-magenta-500/50 transition-all font-light" />
                                            </div>
                                            <div className="text-center mb-12">
                                                <span className="text-[10px] font-black text-magenta-400 uppercase tracking-widest block mb-4">INVERSIÓN POR RESERVA</span>
                                                <div className="flex items-center justify-center space-x-4 font-black"><span className="text-6xl text-white tracking-tighter">$5.000</span><span className="text-xl text-white/40 uppercase">CLP</span></div>
                                            </div>
                                            <div className="flex justify-center group">
                                                <div className="w-full max-w-sm p-[2px] rounded-full bg-gradient-to-r from-cyan-400 via-magenta-500 to-indigo-500 shadow-[0_0_25px_rgba(255,0,127,0.5)] hover:shadow-[0_0_40px_rgba(255,0,127,0.7)] transition-all duration-300 transform active:scale-95">
                                                    <button onClick={handleSubmit} disabled={processing} className="w-full py-5 rounded-full font-black uppercase text-white tracking-widest bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 transition-all duration-300 flex items-center justify-center">
                                                        {processing ? <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-white"></div> : "RESERVAR MI CUPO"}
                                                    </button>
                                                </div>
                                            </div>
                                            <p className="mt-8 text-[11px] text-white/40 italic font-light max-w-xs mx-auto leading-relaxed">"Su inversión garantiza la reserva exclusiva del cupo y el acceso al material técnico pedagógico digital que servirá de soporte fundamental durante su intervención biológica online."</p>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        </main>
                    )}

                    {view === 'success' && (
                        <main className="px-6 py-40 flex flex-col items-center text-center animate-in zoom-in duration-700">
                            <div className="w-32 h-32 bg-cyan-500/20 rounded-full flex items-center justify-center mb-12 border border-cyan-500/50 shadow-2xl"><CheckCircle className="w-16 h-16 text-cyan-400" /></div>
                            <h2 className="text-5xl font-black text-white mb-6 uppercase tracking-tighter leading-none text-center">¡Datos Registrados!</h2>
                            <p className="text-xl text-white/60 mb-12 font-light italic max-w-xl text-center">Tu información ya está en nuestro sistema. Tu cupo Digital se activará visualmente una vez que se verifique tu pago en Flow.</p>
                            <div className="w-full max-w-md space-y-8 mb-16">
                                <div className="p-[2px] rounded-full bg-gradient-to-r from-cyan-400 via-magenta-500 to-indigo-500 shadow-[0_0_25px_rgba(255,0,127,0.5)] hover:shadow-[0_0_40px_rgba(255,0,127,0.7)] transition-all duration-300 transform active:scale-95">
                                    <a href={PAYMENT_URL_FLOW} target="_blank" rel="noopener noreferrer" className="w-full py-5 rounded-full font-black uppercase text-white tracking-widest bg-gradient-to-r from-blue-600 to-purple-600 flex items-center justify-center">
                                        <CreditCard className="w-6 h-6 mr-3" /> 1. PROCEDER AL PAGO
                                    </a>
                                </div>
                                <div className="flex items-center justify-center space-x-4 opacity-30">
                                    <div className="h-[1px] w-full bg-white"></div>
                                    <span className="text-[10px] font-black uppercase">LUEGO</span>
                                    <div className="h-[1px] w-full bg-white"></div>
                                </div>
                                <div className="p-[2px] rounded-full bg-green-500/50 shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all duration-300 transform active:scale-95">
                                    <a href={WHATSAPP_OFFICIAL_LINK} target="_blank" rel="noopener noreferrer" className="w-full py-5 rounded-full font-black uppercase text-white tracking-widest bg-[#25D366] flex items-center justify-center">
                                        <MessageCircle className="w-6 h-6 mr-3" /> 2. ENVIAR COMPROBANTE
                                    </a>
                                </div>
                                <p className="text-[10px] font-black text-green-400 uppercase tracking-widest animate-pulse font-league">Obligatorio para activar tu cupo</p>
                            </div>
                            <button onClick={() => setView('home')} className="text-magenta-500 font-black uppercase tracking-widest text-xs underline hover:text-white transition-colors">Volver al Inicio</button>
                        </main>
                    )}

                    <footer className="py-24 px-8 bg-black/60 text-center border-t border-white/5 backdrop-blur-3xl mt-24">
                        <div className="mb-12 flex justify-center text-center">
                            <button onClick={() => setShowDisclaimer(true)} className="text-[10px] font-black uppercase tracking-[0.4em] text-white/30 hover:text-cyan-400 border-b border-transparent hover:border-cyan-400 transition-all py-2 text-center">Descargo de Responsabilidad</button>
                        </div>
                        <div className="flex justify-center space-x-12 mb-16 items-center">
                            <a href={WHATSAPP_OFFICIAL_LINK} target="_blank" className="transition-all transform hover:scale-125"><img src="https://i.ibb.co/B2V91MGt/REDES-SOCIALES.png" className="w-10 h-10 object-contain" alt="WhatsApp" /></a>
                            <a href="https://www.instagram.com/keto.origins" target="_blank" className="transition-all transform hover:scale-125"><img src="https://i.ibb.co/G4qNtS8Y/REDES-SOCIALES-3.png" className="w-10 h-10 object-contain" alt="Instagram" /></a>
                            <a href="https://www.tiktok.com/@keto.origins" target="_blank" className="transition-all transform hover:scale-125"><img src="https://i.ibb.co/HTbHdkFW/REDES-SOCIALES-2.png" className="w-10 h-10 object-contain" alt="TikTok" /></a>
                            <a href="https://fisiosem.cl/" target="_blank" className="transition-all transform hover:scale-125"><img src="https://i.ibb.co/WWd25yPv/REDES-SOCIALES-1.png" className="w-10 h-10 object-contain" alt="Página Web" /></a>
                        </div>
                        <p className="text-[12px] font-black text-white/20 uppercase tracking-[0.6em] leading-loose text-center">© 2026 KETO ORIGINS<br/>EDUCANDO PARA LA SOBERANÍA BIOLÓGICA</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
